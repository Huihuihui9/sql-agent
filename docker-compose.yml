version: "3.8"

services:
  # ====== SQL Agent 应用 ======
  app:
    build: .
    container_name: sql-agent-app
    ports:
      - "8501:8501"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      - ./data:/app/data  # 持久化数据库
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ====== Nginx 反向代理（可选） ======
  nginx:
    image: nginx:alpine
    container_name: sql-agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - with-nginx  # 默认不启动，用 `docker compose --profile with-nginx up`
